<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>命运之书 - 二维码</title>
<style>
  body {
    margin: 0;
    padding: 40px 20px;
    background: #0a0a0a;
    color: #f0d060;
    font-family: 'Georgia', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  .card {
    background: linear-gradient(160deg, #14110a 0%, #0a0a0a 100%);
    border: 1px solid #c9a84c;
    box-shadow: 0 0 40px rgba(201,168,76,0.2), inset 0 0 30px rgba(201,168,76,0.08);
    padding: 40px;
    border-radius: 4px;
    text-align: center;
    max-width: 400px;
  }
  h1 {
    font-size: 28px;
    letter-spacing: 0.2em;
    margin: 0 0 8px;
    background: linear-gradient(135deg, #f0d060 0%, #c9a84c 50%, #8a6a2e 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    color: rgba(240,208,96,0.6);
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .tagline {
    color: rgba(240,208,96,0.5);
    font-style: italic;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .qr-wrap {
    background: #fff;
    padding: 20px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 20px;
  }
  .url {
    color: rgba(240,208,96,0.7);
    font-size: 12px;
    word-break: break-all;
    padding: 12px 16px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 2px;
    margin-bottom: 16px;
  }
  .footer {
    color: rgba(240,208,96,0.4);
    font-size: 11px;
    letter-spacing: 0.2em;
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #c9a84c;
    margin: 16px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
  }
  @media print {
    body { background: #fff; padding: 0; }
    .card { box-shadow: none; border: 1px solid #999; }
  }
</style>
</head>
<body>
  <div class="card">
    <p class="subtitle">Book of Destiny</p>
    <h1>命运之书</h1>
    <p class="tagline">五十个灵魂拷问，撕下你最后的伪装</p>
    <div class="divider">✦</div>
    <div class="qr-wrap">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&bgcolor=ffffff&color=0a0a0a&margin=0&data=https%3A%2F%2Fdestiny-book-eta.vercel.app%2F" alt="二维码" width="260" height="260" />
    </div>
    <p class="tagline">扫一扫，测出你的真面目</p>
    <div class="url">https://destiny-book-eta.vercel.app/</div>
    <p class="footer">✦ 十二种灵魂卡牌 · 等你揭晓 ✦</p>
  </div>
</body>
</html>
